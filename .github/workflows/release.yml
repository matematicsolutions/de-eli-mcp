name: release

# Publishes to PyPI (org secret PYPI_API_TOKEN) + the MCP Registry (GitHub OIDC).
# Trigger: push a version tag, e.g. `git tag v0.1.0 && git push origin v0.1.0`.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}   # manual re-run of the MCP Registry publish without bumping the package version

permissions:
  contents: read
  id-token: write   # required for the MCP Registry OIDC login

jobs:
  build-and-publish-pypi:
    if: github.event_name == 'push'   # only on a version tag; skipped on manual dispatch
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Build sdist + wheel
        run: python -m build

      - name: Publish to PyPI (org API token)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  # Externalizes volatile runtime config (upstream base URLs + citation grammar)
  # as a gzipped release asset. NON-BLOCKING: PyPI never waits on it, and clients
  # fall back to the hardcoded defaults if the asset is absent. The asset is the
  # lazy first-call config source AND the fleet's activation metric - its URL is
  # built only in code (unlinked), so download_count = a human actually used it.
  build-and-upload-runtime-manifest:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Compress + checksum
        run: |
          test -f runtime/de-runtime.json
          gzip -9 -n -c runtime/de-runtime.json > de-runtime.json.gz
          sha256sum de-runtime.json.gz > de-runtime.json.gz.sha256

      - name: Upload as release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release create "$TAG" --title "$TAG"             --notes "de-eli-mcp $TAG + runtime manifest (base URLs + citation grammar, sha256 alongside)"             de-runtime.json.gz de-runtime.json.gz.sha256           || gh release upload "$TAG" de-runtime.json.gz de-runtime.json.gz.sha256 --clobber

  publish-mcp-registry:
    needs: build-and-publish-pypi
    # run after a successful PyPI publish, OR standalone on manual dispatch
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build-and-publish-pypi.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # OIDC login to the MCP Registry
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_amd64.tar.gz" | tar xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/

      - name: Login to MCP Registry (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish server.json to MCP Registry
        run: mcp-publisher publish

  # --- Registry-activation stage (Smithery) ---------------------------------
  # Ensures the connector is live on Smithery AND carries a human description.
  # WHY a custom step: the Smithery CLI publish flow calls servers.create() with
  # NO body, so the manifest description never reaches the registry (servers show
  # up blank + unsearchable). We publish the thin uvx bundle, then set the
  # description via a direct authenticated PATCH (the only path that sticks).
  # Idempotent + self-gating: no-ops when SMITHERY_API_KEY (org secret) is unset,
  # tolerates "already exists" on re-runs. Activation becomes a side-effect of CI.
  publish-smithery:
    needs: build-and-publish-pypi
    if: always() && (github.event_name == 'workflow_dispatch' || needs.build-and-publish-pypi.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Publish bundle + set description on Smithery
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
          PKG: de-eli-mcp
          DESC: "MCP connector for Germany national law (ELI - European Legislation Identifier). Search and cite German legislation from official government sources. Part of MateMatic's open, local-first EU legal-source connector family. GDPR-safe, MIT."
        run: |
          if [ -z "$SMITHERY_API_KEY" ]; then
            echo "SMITHERY_API_KEY not set - skipping Smithery activation (no-op)."
            exit 0
          fi
          QN="matematicsolutions/$PKG"
          cat > manifest.json <<JSON
          {
            "manifest_version": "0.2",
            "name": "$PKG",
            "version": "1.0.0",
            "description": "$DESC",
            "author": { "name": "MateMatic", "url": "https://matematicsolutions.com" },
            "repository": { "type": "git", "url": "https://github.com/matematicsolutions/$PKG" },
            "server": { "type": "binary", "entry_point": "uvx", "mcp_config": { "command": "uvx", "args": ["$PKG"], "env": {} } },
            "tools": [],
            "license": "MIT"
          }
          JSON
          npx -y @anthropic-ai/mcpb pack . >/dev/null
          npx -y @smithery/cli@latest mcp publish "./$PKG.mcpb" -n "$QN" \
            || echo "publish returned non-zero (server likely already exists) - continuing to description PATCH"
          BODY=$(jq -nc --arg d "$DESC" '{description:$d}')
          curl -sf -X PATCH \
            -H "Authorization: Bearer $SMITHERY_API_KEY" \
            -H "Content-Type: application/json" \
            -H "User-Agent: Mozilla/5.0 (registry-activation; +https://matematicsolutions.com)" \
            -d "$BODY" \
            "https://api.smithery.ai/servers/$QN"
          echo "Smithery activation done for $QN"
